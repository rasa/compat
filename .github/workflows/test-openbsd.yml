
name: test-openbsd

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-openbsd:
    name: test-openbsd
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GOOS: openbsd
      GOARCH: amd64
      CODECOV_SLUG: ${{ github.repository }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      # GITHUB_TOKEN : ${{ secrets.GITHUB_TOKEN }}
    # continue-on-error: true
    steps:
    - uses: actions/checkout@v7
      with:
        show-progress: false

    - uses: vmactions/openbsd-vm@v1
      with:
        envs: 'GOOS GOARCH CODECOV_SLUG CODECOV_TOKEN' # GITHUB_TOKEN'
        usesh: true
        # copyback: false
        prepare: |
          # the double dashes are needed to avoid "ambiguous" warning.
          pkg_add bash coreutils curl git gzip gtar-- jq
          cd /usr/local/bin && ln -sf gsha256sum sha256sum
          # pkg_add go
        run: |
          ./download-build-test.sh

    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        fail_ci_if_error: false
        files: ./coverage.out
        name: coverage-${{ env.GOOS }}
        token: ${{ secrets.CODECOV_TOKEN }}
