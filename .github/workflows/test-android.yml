---
# yaml-language-server: $schema https://json.schemastore.org/github-workflow.json

name: test-android

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-android:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Representative major Android releases:
        # 21: Android 5
        # 23: Android 6
        # 26: Android 8
        # 29: Android 10
        # 31: Android 12
        # 34: Android 14
        # 36: Android 16
        api_level:
          - 21
          - 23
          - 26
          - 29
          - 31
          - 34
          - 36

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Android execution wrapper
        run: |
          cat > "${RUNNER_TEMP}/run-on-android" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          host_bin="$1"
          shift

          # adb shell 'id'
          # adb shell 'ls -ld /data /data/local /data/local/tmp'
          # adb shell 'touch /data/local/tmp/write-test'
          # adb shell 'rm -f /data/local/tmp/write-test'

          tmp1="/data/local/tmp/go-test-$$"
          adb shell mkdir -p "${tmp1}"
          trap 'adb shell rm -rf "${tmp1}" >/dev/null' EXIT

          testdata="${PWD}/testdata"
          if test -d "${testdata}"; then
            adb push "${testdata}" "${tmp1}/testdata" >/dev/null
          fi

          adb push "${host_bin}" "${tmp1}/test" >/dev/null
          adb shell chmod 755 "${tmp1}/test"

          # API 21 adb shell does not propagate the remote exit status.
          # Save it on the device and retrieve it afterward.
          status_file="${tmp1}/exit-code"
          set +e
          adb shell cd "${tmp1}" \; ./test "$@" \; echo \$? \> "${status_file}"
          adb_status=$?
          set -e

          if (( adb_status != 0 )); then
            echo "adb shell failed with status ${adb_status}" >&2
            exit "${adb_status}"
          fi

          test_status=$(adb shell cat "${status_file}" | tr -d '\r\n')

          case "${test_status}" in
            ''|*[!0-9]*)
              echo "Invalid or missing Android test exit status: '${test_status@Q}'" >&2
              exit 1
              ;;
          esac

          adb shell ls -l "${tmp1}"

          exit "${test_status}"
          EOF
          chmod +x "${RUNNER_TEMP}/run-on-android"
  
      - name: Run Go tests on Android
        uses: reactivecircus/android-emulator-runner@v2
        env:
          GOOS: android
          GOARCH: amd64
          CGO_ENABLED: "1"
        with:
          api-level: ${{ matrix.api_level }}
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
          # -count=1 disables test caching
          script: >-
            CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${{ matrix.api_level }}-clang"
            go test
            -exec "${RUNNER_TEMP}/run-on-android"
            -covermode=atomic
            -coverprofile=coverage.out
            -coverpkg=.
            -count=1
            -v
            .
