---
# yaml-language-server: $schema https://json.schemastore.org/github-workflow.json

name: test-android

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-android:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Android execution wrapper
        run: |
          cat > "${RUNNER_TEMP}/run-on-android" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          host_bin="$1"
          shift

          adb shell 'id'
          adb shell 'ls -ld /data /data/local /data/local/tmp'
          adb shell 'touch /data/local/tmp/write-test'
          adb shell 'rm -f /data/local/tmp/write-test'
          
          tmp1="/data/local/tmp/go-test-$$"
          adb shell mkdir -p "${tmp1}"
          trap 'adb shell rm -rf "${tmp1}" >/dev/null' EXIT

          testdata="${PWD}/testdata"
          test -d "${testdata}" && adb push "${testdata}" "${tmp1}/testdata" >/dev/null

          adb push "${host_bin}" "${tmp1}/test" >/dev/null
          adb shell chmod 755 "${tmp1}/test"
          adb shell cd "${tmp1}" \; ./test "$@"

          # API 21 adb shell does not propagate the remote exit status.
          # Save it on the device and retrieve it afterward.
          status_file="${tmp1}/exit-code"
          set +e
          adb shell \
            cd "${tmp1}" \; \
            ./test "$@" \; \
            printf "%d" \$? \> "${status_file}"
          adb_status=$?
          set -e

          if (( adb_status != 0 )); then
            echo "adb shell failed with status ${adb_status}" >&2
            exit "${adb_status}"
          fi

          test_status=$(adb shell cat "${status_file}")

          case "${test_status}" in
            ''|*[!0-9]*)
              echo "Invalid or missing Android test exit status: ${test_status@Q}" >&2
              exit 1
              ;;
          esac

          exit "${test_status}"

          chmod +x "${RUNNER_TEMP}/run-on-android"
          EOF
  
      - name: Run Go tests on Android
        uses: reactivecircus/android-emulator-runner@v2
        env:
          GOOS: android
          GOARCH: amd64
          CGO_ENABLED: "1"
        with:
          api-level: 21
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
          # -count=1 disables test caching
          script: >-
            CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang"
            go test
            -exec "${RUNNER_TEMP}/run-on-android"
            -count=1
            -v
            .
